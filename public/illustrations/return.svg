<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7dd3fc" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="900" height="540" fill="#070a12"/>
  <circle cx="210" cy="130" r="200" fill="url(#g)" opacity="0.85"/>
  <circle cx="760" cy="140" r="170" fill="#22d3ee" opacity="0.07"/>

  <g filter="url(#shadow)">
    <rect x="170" y="140" width="560" height="300" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>

    <!-- Return arrow -->
    <path d="M330 255c75-55 165-35 205 20" fill="none" stroke="rgba(125,211,252,0.70)" stroke-width="14" stroke-linecap="round"/>
    <path d="M340 255h-70l28-28" fill="none" stroke="rgba(125,211,252,0.70)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Checklist tiles -->
    <rect x="230" y="320" width="160" height="90" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
    <rect x="408" y="320" width="160" height="90" rx="18" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.26)"/>
    <rect x="586" y="320" width="120" height="90" rx="18" fill="rgba(125,211,252,0.12)" stroke="rgba(125,211,252,0.26)"/>

    <rect x="250" y="342" width="120" height="14" rx="7" fill="rgba(255,255,255,0.12)"/>
    <rect x="250" y="368" width="90" height="12" rx="6" fill="rgba(255,255,255,0.08)"/>

    <rect x="428" y="342" width="120" height="14" rx="7" fill="rgba(255,255,255,0.12)"/>
    <rect x="428" y="368" width="90" height="12" rx="6" fill="rgba(255,255,255,0.08)"/>

    <rect x="606" y="342" width="80" height="14" rx="7" fill="rgba(255,255,255,0.12)"/>
    <rect x="606" y="368" width="60" height="12" rx="6" fill="rgba(255,255,255,0.08)"/>
  </g>

  <text x="190" y="112" font-family="ui-sans-serif, system-ui" font-size="28" fill="rgba(238,242,255,0.92)" font-weight="700">Retorno</text>
  <text x="190" y="470" font-family="ui-sans-serif, system-ui" font-size="16" fill="rgba(238,242,255,0.65)">Fechamento • devoluções • conferência</text>
</svg>
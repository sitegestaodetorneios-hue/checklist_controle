<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="900" height="540" fill="#070a12"/>
  <circle cx="760" cy="120" r="210" fill="url(#g)" opacity="0.9"/>
  <circle cx="180" cy="130" r="160" fill="#22d3ee" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="170" y="140" width="560" height="300" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>

    <!-- Truck -->
    <rect x="240" y="260" width="260" height="120" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
    <rect x="500" y="290" width="140" height="90" rx="16" fill="rgba(125,211,252,0.12)" stroke="rgba(125,211,252,0.26)"/>
    <rect x="520" y="308" width="70" height="36" rx="10" fill="rgba(7,10,18,0.55)" stroke="rgba(255,255,255,0.10)"/>
    <circle cx="320" cy="392" r="20" fill="rgba(238,242,255,0.88)" opacity="0.16"/>
    <circle cx="560" cy="392" r="20" fill="rgba(238,242,255,0.88)" opacity="0.16"/>
    <circle cx="320" cy="392" r="11" fill="rgba(238,242,255,0.90)" opacity="0.26"/>
    <circle cx="560" cy="392" r="11" fill="rgba(238,242,255,0.90)" opacity="0.26"/>

    <!-- Boxes -->
    <rect x="230" y="186" width="120" height="52" rx="16" fill="rgba(34,211,238,0.14)" stroke="rgba(34,211,238,0.28)"/>
    <rect x="362" y="186" width="140" height="52" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
    <rect x="514" y="186" width="170" height="52" rx="16" fill="rgba(125,211,252,0.14)" stroke="rgba(125,211,252,0.26)"/>
  </g>

  <text x="190" y="112" font-family="ui-sans-serif, system-ui" font-size="28" fill="rgba(238,242,255,0.92)" font-weight="700">Saída do carro</text>
  <text x="190" y="470" font-family="ui-sans-serif, system-ui" font-size="16" fill="rgba(238,242,255,0.65)">Paletes • paleteira • stretch • rastreio</text>
</svg>
